# Wheel build / release pipeline for pigeon-rust.
#
# Targets (per Round-3 Task 3 spec): Linux x86_64, macOS arm64, Windows x86_64.
# abi3 (pyo3 feature `abi3-py39`) means ONE wheel per platform covers
# CPython 3.9-3.13.
#
# Triggers:
#   * push to main             -> build wheels (artifact only)
#   * tag release (v*)         -> build wheels + sdist, upload to release / PyPI
#
# This workflow assumes the package lives at code/rust/hammingbird-py in the repo.
# If you move it to the repo root, drop the `working-directory` and the
# `args` --manifest-path adjustments.
#
# Generated via `maturin generate-ci github` (maturin 1.13.3) then trimmed
# to the three target platforms requested.

name: wheels

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: code/rust/hammingbird-py

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (linux x86_64, abi3)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: code/rust/hammingbird-py
          target: x86_64
          args: --release --out dist
          manylinux: auto
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: code/rust/hammingbird-py/dist

  macos:
    runs-on: macos-14   # arm64 runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (macos arm64, abi3)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: code/rust/hammingbird-py
          target: aarch64-apple-darwin
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: code/rust/hammingbird-py/dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (windows x86_64, abi3)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: code/rust/hammingbird-py
          target: x64
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: code/rust/hammingbird-py/dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: code/rust/hammingbird-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: code/rust/hammingbird-py/dist

  release:
    name: Publish to PyPI on tag
    runs-on: ubuntu-22.04
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi  # gate via GitHub Environments (recommended for trusted publishing)
    permissions:
      id-token: write   # OIDC for PyPI trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
